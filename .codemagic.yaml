# ─────────────────────────────────────────────────────────────────────────────
# Codemagic CI/CD — Cup of News (Capacitor)
#
# Builds the Cup of News React/Vite web app, wraps it with Capacitor, and ships
# native binaries to the App Store (TestFlight) and Google Play (internal track).
#
#   App ID   : news.cupof.app
#   App name : Cup of News
#   Web dir  : dist/public   (Vite build output → Capacitor webDir)
#
# Two workflows, each triggered by pushing a Git tag matching `v*` (e.g. v4.4.0):
#   • ios-release      → builds a signed IPA, uploads to TestFlight
#   • android-release  → builds a signed AAB, uploads to Google Play internal
#
# One-time setup (certificates, signing identities, API keys, env groups) is
# documented in README_CODEMAGIC.md. Nothing secret lives in this file — every
# credential is referenced from a Codemagic environment variable group.
# ─────────────────────────────────────────────────────────────────────────────

workflows:

  # ───────────────────────────────────────────────────────────────────────────
  # iOS — App Store / TestFlight
  # ───────────────────────────────────────────────────────────────────────────
  ios-release:
    name: iOS Release (App Store)
    # macOS instance with the Xcode toolchain. mac_mini_m2 is the current
    # recommended Apple-silicon machine on Codemagic.
    instance_type: mac_mini_m2
    # Build timeout in minutes — a full web build + cap sync + Xcode archive
    # comfortably fits inside 60 minutes.
    max_build_duration: 60

    environment:
      # Pull in the credential groups defined in the Codemagic UI / config.
      # See README_CODEMAGIC.md for what each group must contain.
      groups:
        - ios_signing      # CM_CERTIFICATE, CM_CERTIFICATE_PASSWORD, CM_PROVISIONING_PROFILE
        - app_store_connect # APP_STORE_CONNECT_* (issuer id, key id, private key)
      vars:
        # Bundle identifier — must match capacitor.config.ts and App Store Connect.
        BUNDLE_ID: "news.cupof.app"
        # App Store distribution (TestFlight + App Store), not ad-hoc/development.
        APP_STORE_APPLE_ID: "news.cupof.app"
        XCODE_WORKSPACE: "App.xcworkspace"     # generated by `npx cap add ios`
        XCODE_SCHEME: "App"
      node: 20            # Node.js 20 LTS for the web build
      xcode: latest       # Xcode 15+ (latest stable provided by Codemagic)
      cocoapods: default  # CocoaPods for the iOS Capacitor plugins

    # Build only on version tags like v4.4.0
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Install Node dependencies
        # `npm ci` for reproducible, lockfile-exact installs in CI.
        script: npm ci

      - name: Build web assets (Vite → dist/public)
        script: npm run build

      - name: Add iOS platform if missing
        # The native ios/ project may not be committed. Add it idempotently so
        # the build works whether or not it already exists in the repo.
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor (copy web assets + plugins into native project)
        script: npx cap sync ios

      - name: Set up keychain and code signing
        # Initialise a fresh keychain, import the distribution certificate, and
        # fetch/apply the provisioning profile. Automatic signing is configured
        # via the App Store Connect API key (set up in README_CODEMAGIC.md).
        script: |
          keychain initialize
          # Import the distribution certificate from the CM_CERTIFICATE env var.
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          keychain add-certificates \
            --certificate /tmp/certificate.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"
          # Install the provisioning profile supplied via CM_PROVISIONING_PROFILE.
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > "$PROFILES_HOME/cupofnews.mobileprovision"
          # Apply signing settings to the Xcode project.
          xcode-project use-profiles

      - name: Increment build number from App Store Connect
        # Keep TestFlight build numbers monotonic by basing the next build on the
        # latest one already uploaded for this bundle id.
        script: |
          cd ios/App
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          NEW_BUILD_NUMBER=$(( ${LATEST_BUILD_NUMBER:-0} + 1 ))
          agvtool new-version -all "$NEW_BUILD_NUMBER"

      - name: Build and archive signed IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      # Collect the signed IPA and the Xcode build/archive logs for debugging.
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

    publishing:
      # Email both success and failure notifications.
      email:
        recipients:
          - hello@paulfleury.com
        notify:
          success: true
          failure: true

      # Upload the build to TestFlight after a successful archive. Requires an
      # App Store Connect API key (configured per README_CODEMAGIC.md).
      app_store_connect:
        auth: integration          # use the App Store Connect API key integration
        submit_to_testflight: true
        # Leave App Store (production) submission manual; TestFlight only here.
        submit_to_app_store: false

  # ───────────────────────────────────────────────────────────────────────────
  # Android — Google Play (internal track)
  # ───────────────────────────────────────────────────────────────────────────
  android-release:
    name: Android Release (Google Play)
    # Linux instance is sufficient and cheaper for Android (no macOS needed).
    instance_type: linux_x2
    max_build_duration: 60

    environment:
      groups:
        - android_signing  # CM_KEYSTORE, CM_KEY_ALIAS, CM_KEY_PASSWORD, CM_KEYSTORE_PASSWORD
        - google_play      # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS (Play service account JSON)
      vars:
        PACKAGE_NAME: "news.cupof.app"
      node: 20             # Node.js 20 LTS for the web build
      java: 17             # Java 17 required by the Android Gradle Plugin

    # Build only on version tags like v4.4.0
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web assets (Vite → dist/public)
        script: npm run build

      - name: Add Android platform if missing
        # Idempotent — only adds the native android/ project if not committed.
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor (copy web assets + plugins into native project)
        script: npx cap sync android

      - name: Set up release keystore
        # Decode the base64 keystore from CM_KEYSTORE and write the Gradle
        # signing properties the release build will read.
        script: |
          echo "$CM_KEYSTORE" | base64 --decode > /tmp/release.keystore
          cat >> "$CM_BUILD_DIR/android/key.properties" <<EOF
          storeFile=/tmp/release.keystore
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF

      - name: Build signed release AAB
        # Capacitor's Android project is a standard Gradle project. The
        # bundleRelease task produces the App Bundle Google Play requires.
        # The signing config below should be wired into android/app/build.gradle
        # to read from key.properties (see README_CODEMAGIC.md).
        script: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/release.keystore \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD"

    artifacts:
      # The signed Android App Bundle plus any generated mapping file.
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt

    publishing:
      # Email both success and failure notifications.
      email:
        recipients:
          - hello@paulfleury.com
        notify:
          success: true
          failure: true

      # Publish to the Google Play "internal" testing track after a successful
      # build. Requires a Play service account JSON (configured per README).
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        # Stage the release for review rather than auto-promoting to production.
        submit_as_draft: false
