<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Red rounded square background -->
  <rect width="100" height="100" rx="18" fill="#E3120B"/>
  
  <!-- Coffee cup body (trapezoid: wider at top) -->
  <path d="M28 72 L32 54 L62 54 L66 72 Z" fill="white"/>
  <!-- Cup rim -->
  <rect x="30" y="51" width="34" height="4" rx="2" fill="white"/>
  <!-- Cup handle -->
  <path d="M64 60 Q74 60 74 66 Q74 72 64 72" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Steam line -->
  <line x1="47" y1="51" x2="47" y2="43" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Dove (origami style, geometric) -->
  <!-- Body: rightward teardrop -->
  <path d="M40 40 L56 36 L52 44 Z" fill="white"/>
  <!-- Left wing: angled up-left -->
  <path d="M40 40 L24 26 L42 34 Z" fill="white"/>
  <!-- Right wing: angled up-right -->
  <path d="M50 37 L68 24 L56 36 Z" fill="white"/>
  <!-- Tail -->
  <path d="M40 40 L34 48 L44 44 Z" fill="white"/>
</svg>
