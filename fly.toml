# fly.toml — Cup of News deployment configuration
# App: cup-of-news → app.cupof.news
# Author: Paul Fleury <hello@paulfleury.com>
#
# Fly.io config for Cup of News morning digest service.
# Single shared-cpu-1x machine, persistent volume for SQLite.
#
# Required secrets (set via `fly secrets set`):
#   OPENROUTER_KEY=sk-or-v1-...
#   ADMIN_KEY=your-secure-password
#
# Volume:
#   fly volumes create cup_of_news_data --size 1 --app cup-of-news --region cdg
#   SQLite lives at /data/cup-of-news.db — survives restarts and deploys.

app = "cup-of-news"
primary_region = "cdg"   # Paris — closest to Lisbon

[build]
  # Uses the Dockerfile in the repo root

[env]
  PORT = "8080"
  NODE_ENV = "production"
  DB_PATH = "/data/cup-of-news.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"   # Keep machine always running — no cold starts, no blank page on first load
  auto_start_machines = true
  min_machines_running = 1      # Always at least 1 machine running

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[mounts]]
  source = "cup_of_news_data"
  destination = "/data"

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    port = 8080
    timeout = "5s"
    type = "http"
